# Netlify site for the Payload CMS backend (apps/payload).
# Base directory is the repo root (default). pnpm workspace filter targets
# this app, and `publish` is resolved from the repo root to apps/payload/.next.
# Build runs `payload migrate` (Turso) then `next build`.
[build]
  command = "pnpm --filter apps-payload run build:netlify"
  publish = "apps/payload/.next"

[build.environment]
  NODE_VERSION = "22"
  # S3_REGION/S3_ENDPOINT/S3_BUCKET values are not credentials (region,
  # endpoint URL, and bucket name are public), but Netlify's scanner
  # still flags their values when they happen to match strings in the
  # repo (e.g. generic region strings in skill docs, migration JSON).
  # The real credentials are S3_ACCESS_KEY_ID / S3_SECRET_ACCESS_KEY.
  SECRETS_SCAN_OMIT_KEYS = "S3_REGION,S3_ENDPOINT,S3_BUCKET"

[[plugins]]
  package = "@netlify/plugin-nextjs"
