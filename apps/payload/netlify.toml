# Netlify site for the Payload CMS backend (apps/payload).
# Base directory is the repo root (default). pnpm workspace filter targets
# this app, and `publish` is resolved from the repo root to apps/payload/.next.
# Build runs `payload migrate` (Turso) then `next build`.
[build]
  command = "pnpm --filter apps-payload run build:netlify"
  publish = "apps/payload/.next"

[build.environment]
  NODE_VERSION = "22"

[[plugins]]
  package = "@netlify/plugin-nextjs"
